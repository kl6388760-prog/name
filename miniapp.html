<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Мини-апп</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        
        h2 {
            font-size: 24px;
            margin-bottom: 16px;
            font-weight: 600;
        }
        
        .message {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        button:active {
            opacity: 0.8;
        }
        
        .footer {
            text-align: center;
            font-size: 12px;
            opacity: 0.4;
            margin-top: 48px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📎</div>
        <h2>Вам отправили ссылку</h2>
        <div class="message">
            Нажмите на кнопку ниже, чтобы перейти
        </div>
        <button id="openBtn">🔗 Открыть ссылку</button>
        <div class="footer">
            Telegram Mini App
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Функция расшифровки base64
        function decodeBase64Url(encoded) {
            try {
                let base64 = encoded.replace(/_/g, '/').replace(/-/g, '+');
                while (base64.length % 4) {
                    base64 += '=';
                }
                const decoded = atob(base64);
                return decoded;
            } catch(e) {
                console.error('Ошибка:', e);
                return null;
            }
        }
        
        // Получаем ссылку из URL
        const urlParams = new URLSearchParams(window.location.search);
        let encryptedLink = urlParams.get('url');
        let originalLink = null;
        
        if (encryptedLink) {
            originalLink = decodeBase64Url(encryptedLink);
            if (!originalLink || !originalLink.startsWith('http')) {
                originalLink = null;
            }
        }
        
        // Кнопка
        const openBtn = document.getElementById('openBtn');
        if (openBtn) {
            openBtn.addEventListener('click', function() {
                if (originalLink) {
                    tg.openLink(originalLink);
                    tg.close();
                } else {
                    tg.showAlert('❌ Ссылка недействительна');
                }
            });
        }
        
        // Главная кнопка
        tg.MainButton.setText("Открыть ссылку");
        tg.MainButton.onClick(function() {
            if (originalLink) {
                tg.openLink(originalLink);
                tg.close();
            }
        });
        tg.MainButton.show();
    </script>
</body>
</html>
